name = "my-ai-bot"
main = "src/index.js"
compatibility_date = "2024-12-01"

# --- Friday (default) ---
[[d1_databases]]
binding = "DB"
database_name = "my-ai-bot-db"
database_id = "cecf8fa2-a44c-4605-ab9e-e726f3c1e0b4"
migrations_dir = "migrations"

[vars]
DASHBOARD_URL = "https://friday-dashboard-3rf.pages.dev"
BOT_NAME = "Friday"
BOSS_NICKNAMES = '["บ๊อบ","บ๊อบบี้","จารย์บ๊อบ","พี่บ๊อบ","ครับบ๊อบ","บ๊อบครับ","พ่อใหญ่บ๊อบ","bob"]'
GEMINI_MODEL = "gemini-2.5-flash"
GEMINI_FALLBACK_MODEL = "gemini-2.5-pro"
GEMINI_TEMPERATURE = "0.2"
GEMINI_MAX_RETRIES = "2"

[triggers]
crons = ["0 */3 * * *"]

# --- Daisy ---
[env.daisy]
name = "daisy-ai-bot"

[[env.daisy.d1_databases]]
binding = "DB"
database_name = "daisy-ai-bot-db"
database_id = "31aeb88c-4b94-45ff-b2fc-2d6eb4c027d8"
migrations_dir = "migrations"

[env.daisy.vars]
DASHBOARD_URL = ""
BOT_NAME = "Daisy"
BOSS_TITLE = "นาย"
BOSS_NICKNAMES = '["วุทธ","พี่วุทธ","วุฒิ","woot","W","วัชรินทร์","Watcharin","Woot"]'
GEMINI_MODEL = "gemini-2.5-flash"
GEMINI_FALLBACK_MODEL = "gemini-2.5-pro"
GEMINI_TEMPERATURE = "0.2"
GEMINI_MAX_RETRIES = "2"

[env.daisy.triggers]
crons = ["0 */3 * * *"]

# --- Sigma ---
[env.sigma]
